<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyllo - Entrando</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0E0E14 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6C47FF, #8B5CF6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(108, 71, 255, 0.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(108, 71, 255, 0.2);
      border-top-color: #6C47FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📚</div>
    <div>
      <h1>Bem-vindo ao Vyllo!</h1>
      <p>Entrando com a tua conta Google...</p>
      <div class="spinner"></div>
      <div class="status">Por favor aguarda</div>
    </div>
  </div>

  <script>
    // Supabase OAuth callback redirect
    (async () => {
      try {
        // Get the hash from URL (Supabase sets tokens here)
        const hash = window.location.hash;

        // Wait a moment for Supabase to process
        await new Promise(resolve => setTimeout(resolve, 800));

        // Redirect to home
        window.location.href = '/' + hash;
      } catch (error) {
        console.error('Auth callback error:', error);
        // Fallback redirect
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
    })();
  </script>
</body>
</html>
